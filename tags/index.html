---
layout: default
title: Tags
---
<div class="tags-page">
    <h1><span class="prompt">~/</span> Tags</h1>
    <div class="tag-cloud">
        {% for tag in site.tags %}
        <a href="/tags/#{{ tag[0] | slugize }}" class="tag-item">{{ tag[0] }} <span class="count">{{ tag[1].size }}</span></a>
        {% endfor %}
    </div>

    <div class="tag-sections">
        {% for tag in site.tags %}
        <section class="tag-section" id="{{ tag[0] | slugize }}">
            <h2>{{ tag[0] }}</h2>
            <ul class="post-list">
                {% for post in tag[1] %}
                <li>
                    <span class="post-meta">{{ post.date | date: "%Y-%m-%d" }}</span>
                    <a href="{{ post.url }}">{{ post.title }}</a>
                </li>
                {% endfor %}
            </ul>
        </section>
        {% endfor %}
    </div>
</div>
