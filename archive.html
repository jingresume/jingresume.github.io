---
layout: default
title: Archive
---
<div class="archive">
    <h1>Archive</h1>
    <ul class="post-list">
        {% for post in site.posts %}
        <li>
            <span class="post-meta">{{ post.date | date: "%Y-%m-%d" }}</span>
            <h3><a href="{{ post.url | relative_url }}">{{ post.title }}</a></h3>
        </li>
        {% endfor %}
    </ul>
</div>
