---
layout: default
title: Archive
---
<div class="archive">
    <h1><span class="prompt">~/</span> Archive</h1>
    {% for post in site.posts %}
    <div class="archive-item">
        <span class="post-meta">{{ post.date | date: "%Y-%m-%d" }}</span>
        <a href="{{ post.url }}">{{ post.title }}</a>
        {% if post.categories %}
        <span class="archive-categories">
            {% for cat in post.categories %}
                <a href="/category/#{{ cat | slugize }}">{{ cat }}</a>{% if forloop.last == false %}, {% endif %}
            {% endfor %}
        </span>
        {% endif %}
    </div>
    {% endfor %}
</div>
