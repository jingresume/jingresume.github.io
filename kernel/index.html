---
layout: default
title: Kernel
---
<div class="category-page-main">
    <h1><span class="prompt">[#]</span> Kernel</h1>
    <p class="category-desc">Linux kernel, system programming, and low-level internals.</p>
    <div class="post-list">
        {% for post in site.categories.kernel %}
        <article class="post-card">
            <div class="post-card-meta">
                <time datetime="{{ post.date | date_to_xmlschema }}">{{ post.date | date: "%Y-%m-%d" }}</time>
            </div>
            <h2 class="post-card-title"><a href="{{ post.url }}">{{ post.title }}</a></h2>
            <div class="post-card-excerpt">{{ post.content | strip_html | truncatewords: 30 }}</div>
            <a href="{{ post.url }}" class="read-more">Read more →</a>
        </article>
        {% endfor %}
    </div>
</div>
