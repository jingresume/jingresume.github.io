title: Jing Blog
author: jingresume
email: your.email@example.com
description: Personal blog powered by Jekyll
baseurl: ""
url: "https://jingresume.github.io"
github_username: jingresume

# Disqus comments (replace with your Disqus shortname)
disqus_shortname: jingresume

# Build settings
markdown: kramdown
remote_theme: minima
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-paginate

# Pagination
paginate: 5
paginate_path: "/page/:num/"

# Category pages
permalink: /:categories/:title/

# Sass
sass:
  sass_dir: _sass
  style: compressed
