---
layout: default
title: Gallery
---
<div class="gallery-page-full">
    <h1><span class="prompt">[$]</span> Gallery</h1>
    <p class="gallery-desc">A collection of moments captured through my lens.</p>

    <div class="gallery-feed-full">
        {% for post in site.gallery %}
        <a href="{{ post.url }}" class="gallery-card">
            <div class="gallery-card-image">
                <img src="{{ post.cover }}" alt="{{ post.title }}" loading="lazy">
            </div>
            <div class="gallery-card-content">
                <h3 class="gallery-card-title">{{ post.title }}</h3>
                <p class="gallery-card-excerpt">{{ post.excerpt }}</p>
                <div class="gallery-card-meta">
                    <span class="meta-item">📍 {{ post.location }}</span>
                    <span class="meta-item">📷 {{ post.camera }}</span>
                    <span class="meta-item">📅 {{ post.date | date: "%Y-%m-%d" }}</span>
                </div>
            </div>
        </a>
        {% endfor %}
    </div>
</div>
